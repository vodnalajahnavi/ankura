<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANKURA — Smart Seed Intelligence for Better Yields</title>
  <meta name="description"
    content="ANKURA is an AI-powered seed quality, viability & yield prediction platform for precision agriculture." />
  <meta name="theme-color" content="#16a34a" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <!-- Google Translate Init -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages: 'en,hi,te,ta,kn,mr',
          autoDisplay: false
        },
        'google_translate_element'
      );
    }

    // 🔥 FIXED FUNCTION (handles multiple clicks properly)
    function changeLanguage(lang) {
      const interval = setInterval(() => {
        const select = document.querySelector(".goog-te-combo");

        if (select) {
          // Step 1: reset to English
          select.value = "en";
          select.dispatchEvent(new Event("change"));

          // Step 2: apply selected language
          setTimeout(() => {
            select.value = lang;
            select.dispatchEvent(new Event("change"));
          }, 200);

          clearInterval(interval);
        }
      }, 500);
    }
  </script>

  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- Clean Styling (Hide Google UI) -->
  <style>
    body {
      top: 0px !important;
    }

    #google_translate_element {
      display: none;
    }

    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    .goog-logo-link {
      display: none !important;
    }

    .goog-te-gadget {
      font-size: 0px !important;
    }
  </style>
</head>

<body>

  <!-- Hidden Google Translate Element -->
  <div id="google_translate_element"></div>

  <!-- React Root -->
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
